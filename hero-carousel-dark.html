    <title>Hero Carousel - Angled Vertical Flow (Transparent & Slower)</title>
    <style>
        /* ============================================
           HERO CAROUSEL - Angled Vertical Strip Scroll
           ============================================ */
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            /* Completely transparent body */
            background-color: transparent !important; 
        }

        .hero-carousel {
            background-color: transparent !important;
            height: 100vh;
            width: 100vw;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Container for the vertical columns */
        .carousel-container {
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            display: flex;
            flex-direction: row; 
            justify-content: center;
            gap: clamp(16px, 2.5vw, 32px);
            
            transform: rotate(12deg);
            -webkit-transform: rotate(12deg);
            
            pointer-events: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Each image column */
        .carousel-col {
            display: flex;
            flex-direction: column; 
            height: fit-content;
            will-change: transform;
            min-width: 150px; 
            flex-shrink: 0;
            animation-play-state: paused;
            -webkit-animation-play-state: paused;
        }

        /* Speeds kept at 180s (20% slower) */
        .carousel-col.move-down {
            animation: slideDown 180s linear infinite;
            -webkit-animation: slideDown 180s linear infinite;
        }

        .carousel-col.move-up {
            animation: slideUp 180s linear infinite;
            -webkit-animation: slideUp 180s linear infinite;
        }

        .carousel-col.animate {
            animation-play-state: running;
            -webkit-animation-play-state: running;
        }

        @keyframes slideDown {
            0% { transform: translate3d(0, -50%, 0); }
            100% { transform: translate3d(0, 0%, 0); }
        }

        @-webkit-keyframes slideDown {
            0% { -webkit-transform: translate3d(0, -50%, 0); }
            100% { -webkit-transform: translate3d(0, 0%, 0); }
        }

        @keyframes slideUp {
            0% { transform: translate3d(0, 0%, 0); }
            100% { transform: translate3d(0, -50%, 0); }
        }

        @-webkit-keyframes slideUp {
            0% { -webkit-transform: translate3d(0, 0%, 0); }
            100% { -webkit-transform: translate3d(0, -50%, 0); }
        }

        /* The images within the columns */
        .carousel-img {
            width: clamp(200px, 22vw, 350px); 
            height: auto;
            display: block;
            flex-shrink: 0;
            object-fit: contain;
            -webkit-object-fit: contain;
            margin-bottom: clamp(16px, 2.5vw, 32px); 
            
            /* FORCED TRANSPARENCY: Removed box-shadow and border radius to ensure CSS draws NO boxes */
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            border-radius: 0 !important;
        }

        .carousel-overlay, .carousel-overlay-radial {
            display: none; /* Disabled overlays entirely just to be safe */
        }

        /* ============================================
           RESPONSIVE STYLES
           ============================================ */

        @media (max-width: 1200px) {
            .carousel-img { width: clamp(180px, 25vw, 280px); }
        }

        @media (max-width: 900px) {
            .carousel-col:nth-child(4) { display: none; }
            .carousel-img { width: clamp(160px, 30vw, 240px); }
            .carousel-container {
                transform: rotate(12deg) scale(0.85);
                -webkit-transform: rotate(12deg) scale(0.85);
            }
        }

        @media (max-width: 600px) {
            .carousel-img { width: clamp(140px, 45vw, 200px); }
            .carousel-container {
                transform: rotate(12deg) scale(0.7);
                -webkit-transform: rotate(12deg) scale(0.7);
                gap: 16px;
            }
        }
    </style>

<script>
    (function() {
        const ANIMATION_DELAY = 2000;

        function startCarouselAnimations() {
            const cols = document.querySelectorAll('.carousel-col');
            cols.forEach(function(col) {
                col.classList.add('animate');
            });
        }

        if (document.readyState === 'complete') {
            setTimeout(startCarouselAnimations, ANIMATION_DELAY);
        } else {
            window.addEventListener('load', function() {
                setTimeout(startCarouselAnimations, ANIMATION_DELAY);
            });
        }
    })();
</script>
